services:
  - type: web
    name: inspeccion-vehiculos-app
    env: node
    plan: free
    buildCommand: npm install && npm run build:frontend
    startCommand: node safenode-inspecciones/src/server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: db-inspecciones
          property: connectionString

databases:
  - name: db-inspecciones
    plan: free
