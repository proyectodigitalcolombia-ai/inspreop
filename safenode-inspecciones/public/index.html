<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YEGO ECO-T - Inspección Preoperacional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --yego-purple: #6f1ab6; 
            --yego-yellow: #ffc107; 
            --yego-bg: #f8f9fa;
        }
        
        body { background-color: var(--yego-bg); font-family: 'Segoe UI', sans-serif; }
        
        .header-yego {
            background-color: var(--yego-purple);
            color: white;
            border-bottom: 5px solid var(--yego-yellow);
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .card { border: none; border-radius: 15px; margin-bottom: 20px; }
        .card-header { font-weight: bold; text-transform: uppercase; }
        
        .btn-yego {
            background-color: var(--yego-purple);
            color: white;
            border-radius: 50px;
            font-weight: bold;
            padding: 12px;
            transition: 0.3s;
        }
        .btn-yego:hover { background-color: #5a1494; color: var(--yego-yellow); }

        .form-check-input:checked { background-color: var(--yego-purple); border-color: var(--yego-purple); }
        
        /* Estilo para los interruptores (Switches) */
        .custom-switch { transform: scale(1.3); cursor: pointer; }
    </style>
</head>
<body>

    <header class="header-yego text-center shadow">
        <h2 class="fw-bold">YEGO ECO-T S.A.S.</h2>
        <p class="mb-0 small">Formato: 03-FOR-07 Rev9 | Control Logístico</p>
    </header>

    <div class="container pb-5">
        <form id="formInspeccion">
            
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white py-3">
                    <i class="fas fa-info-circle me-2"></i> Información General
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Manifiesto</label>
                            <input type="text" id="manifiesto" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Fecha</label>
                            <input type="date" id="fecha" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nombre del Conductor</label>
                            <input type="text" id="conductor_nombre" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Tipo de Documento</label>
                            <select id="tipo_documento" class="form-select">
                                <option>Cédula de Ciudadanía</option>
                                <option>Cédula de Extranjería</option>
                                <option>PPT</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">N° Documento</label>
                            <input type="text" id="conductor_documento" class="form-control" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-bold">Placa</label>
                            <input type="text" id="vehiculo_placa" class="form-control text-uppercase" placeholder="ABC123" required oninput="this.value = this.value.toUpperCase()">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Clase de Vehículo</label>
                            <select id="clase_vehiculo" class="form-select">
                                <option>Turbo</option>
                                <option>Sencillo</option>
                                <option>Doble Troque</option>
                                <option>Camioneta</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Kilometraje</label>
                            <input type="number" id="kilometraje" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Modalidad</label>
                            <select id="modalidad" class="form-select">
                                <option>Urbano</option>
                                <option>Nacional</option>
                                <option>Especial</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div id="seccionesInspeccion"></div>

            <div class="card mb-4 shadow border-0" style="background: linear-gradient(90deg, #e67e22 0%, #d35400 100%);">
                <div class="card-body d-flex justify-content-between align-items-center text-white">
                    <h6 class="m-0 fw-bold"><i class="fas fa-exclamation-triangle me-2"></i> ¿Transporta Mercancías Peligrosas?</h6>
                    <div class="form-check form-switch">
                        <input class="form-check-input custom-switch" type="checkbox" id="checkKitDerrames">
                    </div>
                </div>
            </div>
            <div id="bloqueKitDerrames" style="display: none;"></div>

            <div class="card mb-4 shadow border-0" style="background: linear-gradient(90deg, #6f1ab6 0%, #8e44ad 100%);">
                <div class="card-body d-flex justify-content-between align-items-center text-white">
                    <h6 class="m-0 fw-bold"><i class="fas fa-link me-2"></i> ¿Lleva Unidad de Remolque?</h6>
                    <div class="form-check form-switch">
                        <input class="form-check-input custom-switch" type="checkbox" id="checkRemolque">
                    </div>
                </div>
            </div>
            <div id="bloqueRemolque" style="display: none;"></div>

            <div class="card mb-4 shadow border-0" style="border-left: 6px solid var(--yego-purple);">
                <div class="card-header bg-light text-dark py-3 text-center">FIRMAS DE RESPONSABILIDAD</div>
                <div class="card-body row text-center">
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold d-block">Firma Conductor</label>
                        <canvas id="firmaConductor" class="border rounded bg-white w-100" style="height: 150px;"></canvas>
                        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="limpiarFirma('firmaConductor')">Limpiar</button>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold d-block">Firma Inspector</label>
                        <canvas id="firmaInspector" class="border rounded bg-white w-100" style="height: 150px;"></canvas>
                        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="limpiarFirma('firmaInspector')">Limpiar</button>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-yego btn-lg shadow">
                    <i class="fas fa-save me-2"></i> GESTIONAR INSPECCIÓN FINAL
                </button>
            </div>
        </form>

        <footer class="text-center mt-5 text-muted small">
            &copy; 2026 YEGO ECO-T S.A.S. | Control Logístico
        </footer>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
