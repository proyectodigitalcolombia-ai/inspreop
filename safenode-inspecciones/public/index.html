<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeNode - Inspección Preoperacional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root { 
        --yego-purple: #6f1ab6; /* Morado corporativo YEGO */
        --yego-yellow: #ffc107; /* Amarillo de contraste */
        --yego-bg: #f8f9fa;
        --yego-dark: #2d2d2d;
    }
    
    body { background-color: var(--yego-bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Encabezado estilo Plataforma Logística */
    .header-yego {
        background-color: var(--yego-purple);
        color: white;
        border-bottom: 5px solid var(--yego-yellow);
        padding: 30px 0;
        margin-bottom: 30px;
    }

    .btn-yego {
        background-color: var(--yego-purple);
        color: white;
        border: none;
        font-weight: bold;
        padding: 15px;
        border-radius: 50px; /* Estilo redondeado como tus botones */
        transition: 0.3s;
    }
    
    .btn-yego:hover {
        background-color: #5a1494;
        color: var(--yego-yellow);
        transform: scale(1.02);
    }

    /* Tarjetas y Tablas */
    .card { border: none; border-radius: 15px; overflow: hidden; }
    .card-header { 
        background-color: var(--yego-purple) !important; 
        color: white !important; 
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    .table thead { background-color: #f1f1f1; }
    .form-check-input:checked {
        background-color: var(--yego-purple);
        border-color: var(--yego-purple);
    }

    .border-yego { border-left: 6px solid var(--yego-purple); }
</style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="card shadow-sm mb-4 border-0">
            <div class="card-body text-center">
                <img src="https://via.placeholder.com/200x80?text=SafeNode+SAS" alt="Logo SafeNode" class="logo-placeholder">
                <h3 class="text-primary fw-bold">Gestión de Inspecciones</h3>
                <p class="text-muted small mb-0">Formato Único: 03-FOR-07 Rev9</p>
            </div>
        </div>

        <form id="formInspeccion">
            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-dark text-white font-weight-bold">
                    <i class="fas fa-truck-moving me-2"></i> Información General
                </div>
                <div class="card-body row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Conductor</label>
                        <input type="text" id="conductor_nombre" class="form-control" placeholder="Nombre completo" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Cédula</label>
                        <input type="text" id="conductor_documento" class="form-control" placeholder="Número de identificación" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Placa</label>
                        <input type="text" id="vehiculo_placa" class="form-control text-uppercase" placeholder="ABC-123" required>
                    </div>
                </div>
            </div>

            <div id="seccionesInspeccion"></div>

            <div class="d-grid gap-2 mt-5">
                <button type="submit" class="btn btn-success btn-lg shadow">
                    <i class="fas fa-paper-plane me-2"></i> Firmar y Enviar Inspección
                </button>
            </div>
        </form>

        <footer class="text-center mt-5 pb-4 text-muted small">
            &copy; 2026 SafeNode S.A.S. | Todos los derechos reservados.
        </footer>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
