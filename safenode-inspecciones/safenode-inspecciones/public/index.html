<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeNode - Inspección Preoperacional</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body text-center">
                <h2 class="text-primary">SafeNode S.A.S.</h2>
                <h5>Inspección Preoperacional y Cargue (03-FOR-07 Rev9)</h5>
            </div>
        </div>

        <form id="formInspeccion">
            <div class="card mb-4">
                <div class="card-header bg-dark text-white">Datos del Conductor y Vehículo</div>
                <div class="card-body row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Nombre del Conductor</label>
                        <input type="text" id="conductor_nombre" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Cédula</label>
                        <input type="text" id="conductor_documento" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Placa del Vehículo</label>
                        <input type="text" id="vehiculo_placa" class="form-control" required placeholder="ABC-123">
                    </div>
                </div>
            </div>

            <div id="seccionesInspeccion"></div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success btn-lg">Enviar Inspección</button>
            </div>
        </form>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
